<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StableAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.status-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 16px;font-size:13px;display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:#666;}
.dot.green{background:#4ade80;}.dot.gold{background:#fbbf24;}.dot.blue{background:#60a5fa;}.dot.red{background:#f87171;}
.settings-btn{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;color:#fff;z-index:200;}
.settings-panel{position:fixed;top:56px;right:16px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:16px;width:300px;display:none;z-index:200;}
.settings-panel.open{display:block;}
.settings-panel input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px;color:#fff;font-size:13px;margin:8px 0;}
.settings-panel button{width:100%;background:#4a90d9;border:none;border-radius:8px;padding:8px;color:#fff;cursor:pointer;}
.face-card{width:300px;height:360px;background:#141420;border:1px solid rgba(255,255,255,0.08);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;gap:8px;}
.face-card.speaking{box-shadow:0 0 0 2px rgba(74,144,217,0.7),0 0 40px rgba(74,144,217,0.12);}
.response-bubble{position:absolute;top:12px;left:12px;right:12px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.5;display:none;z-index:2;}
.avatar-img{width:200px;height:200px;}
.name-block{text-align:center;}
.name-block h2{font-size:20px;font-weight:700;}
.name-block p{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;}
.discuss-btn{background:linear-gradient(135deg,#4a90d9,#357abd);border:none;border-radius:24px;padding:14px 52px;font-size:17px;font-weight:600;color:#fff;cursor:pointer;}
.discuss-btn:disabled{opacity:0.5;cursor:default;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;padding:0 16px;}
.chip{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;}
.chip:hover{background:rgba(255,255,255,0.13);}
</style>
</head>
<body>
<div class="status-bar"><div class="dot" id="dot"></div><span id="statusText">Not connected</span></div>
<button class="settings-btn" id="settingsBtn">⚙ Settings</button>
<div class="settings-panel" id="settingsPanel">
  <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:4px;">WebSocket URL</div>
  <input type="text" id="serverUrl" placeholder="wss://....ngrok.../ws/talk"/>
  <button id="connectBtn">Connect</button>
</div>
<div class="face-card" id="faceCard">
  <div class="response-bubble" id="responseBubble"></div>
  <img class="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=StableAI" onerror="this.src='/avatar.jpg'"/>
  <div class="name-block"><h2>StableAI</h2><p>Fixed Income Advisor</p></div>
</div>
<button class="discuss-btn" id="discussBtn">Discuss</button>
<div class="chips">
  <div class="chip" data-q="What is Stable Money?">What is Stable Money?</div>
  <div class="chip" data-q="How safe are FDs?">How safe are FDs?</div>
  <div class="chip" data-q="Expected returns?">Expected returns?</div>
  <div class="chip" data-q="Tell me about Sukoon">Tell me about Sukoon</div>
  <div class="chip" data-q="Better than bank FDs?">Better than bank FDs?</div>
  <div class="chip" data-q="Min investment?">Min investment?</div>
</div>
<script>
var ws = null;
var ready = false;
var speaking = false;
var audioCtx = null;
var recognition = null;

function setStatus(txt, color) {
  document.getElementById('statusText').textContent = txt;
  var d = document.getElementById('dot');
  d.className = 'dot' + (color ? ' ' + color : '');
}

document.getElementById('settingsBtn').addEventListener('click', function() {
  document.getElementById('settingsPanel').classList.toggle('open');
});

document.getElementById('connectBtn').addEventListener('click', function() {
  connect();
});

function connect() {
  var url = document.getElementById('serverUrl').value.trim();
  if (!url) { setStatus('Enter WS URL first', 'red'); return; }
  document.getElementById('settingsPanel').classList.remove('open');
  setStatus('Connecting…', 'gold');
  try {
    ws = new WebSocket(url);
    ws.onopen = function() {
      ws.send(JSON.stringify({type: 'config'}));
      ready = true;
      setStatus('Ready · Tap Discuss', 'green');
    };
    ws.onmessage = function(e) { handleMsg(JSON.parse(e.data)); };
    ws.onerror = function() { setStatus('Connection failed', 'red'); ready = false; };
    ws.onclose = function() { setStatus('Disconnected', 'red'); ready = false; };
  } catch(e) { setStatus('Error: ' + e.message, 'red'); }
}

function handleMsg(msg) {
  if (msg.type === 'text_chunk') {
    var b = document.getElementById('responseBubble');
    b.textContent = msg.text;
    b.style.display = 'block';
  }
  if (msg.type === 'audio') { playAudio(msg.data, msg.format); }
  if (msg.type === 'done') { if (!speaking) resetState(); }
  if (msg.type === 'error') { setStatus('Error', 'red'); resetState(); }
}

function playAudio(b64, fmt) {
  var bytes = Uint8Array.from(atob(b64), function(c) { return c.charCodeAt(0); });
  var blob = new Blob([bytes], {type: 'audio/' + fmt});
  var url = URL.createObjectURL(blob);
  var audio = new Audio(url);
  speaking = true;
  document.getElementById('faceCard').classList.add('speaking');
  document.getElementById('discussBtn').textContent = 'Speaking…';
  setStatus('Speaking…', 'blue');
  audio.onended = function() { resetState(); };
  audio.play().catch(function() { resetState(); });
}

function resetState() {
  speaking = false;
  document.getElementById('faceCard').classList.remove('speaking');
  document.getElementById('discussBtn').textContent = 'Discuss';
  document.getElementById('discussBtn').disabled = false;
  setStatus('Ready · Tap Discuss', 'green');
  setTimeout(function() { document.getElementById('responseBubble').style.display = 'none'; }, 3000);
}

function sendText(text) {
  if (!ws || !ready) return;
  speaking = true;
  document.getElementById('discussBtn').disabled = true;
  document.getElementById('discussBtn').textContent = 'Thinking…';
  setStatus('Thinking…', 'blue');
  ws.send(JSON.stringify({type: 'speak', text: text}));
}

document.getElementById('discussBtn').addEventListener('click', function() {
  if (!ready) { document.getElementById('settingsPanel').classList.add('open'); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech not supported — use chips below'); return; }
  if (!recognition) {
    recognition = new SR();
    recognition.lang = 'en-IN';
    recognition.interimResults = false;
    recognition.onresult = function(e) { sendText(e.results[0][0].transcript); };
    recognition.onerror = function(e) { setStatus('Mic error: ' + e.error, 'red'); };
    recognition.onend = function() { document.getElementById('discussBtn').textContent = 'Discuss'; };
  }
  recognition.start();
  document.getElementById('discussBtn').textContent = 'Listening…';
  setStatus('Listening…', 'gold');
});

document.querySelectorAll('.chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    sendText(this.getAttribute('data-q'));
  });
});
</script>
</body>
</html>

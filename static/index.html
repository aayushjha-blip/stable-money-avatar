<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StableAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.status-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 16px;font-size:13px;display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:#666;}
.dot.green{background:#4ade80;}.dot.gold{background:#fbbf24;}.dot.blue{background:#60a5fa;}.dot.red{background:#f87171;}
.settings-btn{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;color:#fff;}
.settings-panel{position:fixed;top:56px;right:16px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:16px;width:300px;display:none;z-index:100;}
.settings-panel.open{display:block;}
.settings-panel input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px;color:#fff;font-size:13px;margin:8px 0;}
.settings-panel button{width:100%;background:#4a90d9;border:none;border-radius:8px;padding:8px;color:#fff;cursor:pointer;}
.face-card{width:300px;height:380px;background:#141420;border:1px solid rgba(255,255,255,0.08);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;gap:8px;}
.face-card.speaking{box-shadow:0 0 0 2px rgba(74,144,217,0.7),0 0 40px rgba(74,144,217,0.12);}
.response-bubble{position:absolute;top:12px;left:12px;right:12px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.5;display:none;z-index:2;}
.name-block{text-align:center;}
.name-block h2{font-size:20px;font-weight:700;}
.name-block p{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;}
.discuss-btn{background:linear-gradient(135deg,#4a90d9,#357abd);border:none;border-radius:24px;padding:14px 52px;font-size:17px;font-weight:600;color:#fff;cursor:pointer;}
.discuss-btn:disabled{opacity:0.5;cursor:default;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;padding:0 16px;}
.chip{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;}
.chip:hover{background:rgba(255,255,255,0.13);}
</style>
</head>
<body>
<div class="status-bar"><div class="dot" id="dot"></div><span id="statusText">Connecting…</span></div>
<button class="settings-btn" onclick="toggleSettings()">⚙ Settings</button>
<div class="settings-panel" id="settingsPanel">
  <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:4px;">WebSocket URL</div>
  <input type="text" id="serverUrl" value="ws://localhost:8000/ws/talk"/>
  <button onclick="connectServer()">Connect</button>
</div>
<div class="face-card" id="faceCard">
  <div class="response-bubble" id="responseBubble"></div>
  <svg style="width:220px;height:220px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none" shape-rendering="auto"><metadata xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/"><rdf:RDF><rdf:Description><dc:title>Avataaars</dc:title><dc:creator>Pablo Stanley</dc:creator><dc:source xsi:type="dcterms:URI">https://avataaars.com/</dc:source><dcterms:license xsi:type="dcterms:URI">https://avataaars.com/</dcterms:license><dc:rights>Remix of „Avataaars” (https://avataaars.com/) by „Pablo Stanley”, licensed under „Free for personal and commercial use” (https://avataaars.com/)</dc:rights></rdf:Description></rdf:RDF></metadata><mask id="viewboxMask"><rect width="280" height="280" rx="0" ry="0" x="0" y="0" fill="#fff" /></mask><g mask="url(#viewboxMask)"><g transform="translate(8)"><path d="M132 36a56 56 0 0 0-56 56v6.17A12 12 0 0 0 66 110v14a12 12 0 0 0 10.3 11.88 56.04 56.04 0 0 0 31.7 44.73v18.4h-4a72 72 0 0 0-72 72v9h200v-9a72 72 0 0 0-72-72h-4v-18.39a56.04 56.04 0 0 0 31.7-44.73A12 12 0 0 0 198 124v-14a12 12 0 0 0-10-11.83V92a56 56 0 0 0-56-56Z" fill="#edb98a"/><path d="M108 180.61v8a55.79 55.79 0 0 0 24 5.39c8.59 0 16.73-1.93 24-5.39v-8a55.79 55.79 0 0 1-24 5.39 55.79 55.79 0 0 1-24-5.39Z" fill="#000" fill-opacity=".1"/><g transform="translate(0 170)"><path d="M108 14.7c-15.52 3.68-27.1 10.83-30.77 19.44A72.02 72.02 0 0 0 32 101v9h200v-9a72.02 72.02 0 0 0-45.23-66.86C183.1 25.53 171.52 18.38 156 14.7V32a24 24 0 1 1-48 0V14.7Z" fill="#65c9ff"/><path d="M102 63.34a67.1 67.1 0 0 1-7-2.82V110h7V63.34ZM162 63.34a67.04 67.04 0 0 0 7-2.82V98.5a3.5 3.5 0 1 1-7 0V63.34Z" fill="#F4F4F4"/><path d="M187.62 34.49a71.79 71.79 0 0 1 10.83 5.63C197.11 55.62 167.87 68 132 68c30.93 0 56-13.43 56-30 0-1.19-.13-2.36-.38-3.51ZM76.38 34.49a16.48 16.48 0 0 0-.38 3.5c0 16.58 25.07 30 56 30-35.87 0-65.1-12.38-66.45-27.88a71.79 71.79 0 0   <div class="name-block"><h2>StableAI</h2><p>Fixed Income Advisor</p></div>
</div>
<button class="discuss-btn" id="discussBtn" onclick="startDiscuss()">Discuss</button>
<div class="chips">
  <div class="chip" onclick="sendText('What is Stable Money?')">What is Stable Money?</div>
  <div class="chip" onclick="sendText('How safe are FDs?')">How safe are FDs?</div>
  <div class="chip" onclick="sendText('Expected returns?')">Expected returns?</div>
  <div class="chip" onclick="sendText('Tell me about Sukoon')">Tell me about Sukoon</div>
  <div class="chip" onclick="sendText('Better than bank FDs?')">Better than bank FDs?</div>
  <div class="chip" onclick="sendText('Min investment?')">Min investment?</div>
</div>
<script>
const S={ws:null,ready:false,speaking:false,audioCtx:null,analyser:null,animId:null};
function toggleSettings(){document.getElementById("settingsPanel").classList.toggle("open");}
function setStatus(txt,color){document.getElementById("statusText").textContent=txt;document.getElementById("dot").className="dot"+(color?" "+color:"");}
function connectServer(){
  const url=document.getElementById("serverUrl").value.trim();
  document.getElementById("settingsPanel").classList.remove("open");
  setStatus("Connecting…","gold");
  try{
    S.ws=new WebSocket(url);
    S.ws.onopen=()=>{S.ws.send(JSON.stringify({type:"config"}));S.ready=true;setStatus("Ready · Tap Discuss","green");};
    S.ws.onmessage=e=>handleMsg(JSON.parse(e.data));
    S.ws.onerror=()=>{setStatus("Connection failed","red");S.ready=false;};
    S.ws.onclose=()=>{setStatus("Disconnected","red");S.ready=false;};
  }catch(e){setStatus("Error: "+e.message,"red");}
}
function handleMsg(msg){
  if(msg.type==="text_chunk"){const b=document.getElementById("responseBubble");b.textContent=msg.text;b.style.display="block";}
  if(msg.type==="audio"){playAudio(msg.data,msg.format);}
  if(msg.type==="done"){ if(!S.speaking)resetState(); }
  if(msg.type==="error"){setStatus("Error","red");resetState();}
}
function playAudio(b64,fmt){
  const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const blob=new Blob([bytes],{type:"audio/"+fmt});
  const url=URL.createObjectURL(blob);
  const audio=new Audio(url);
  if(!S.audioCtx)S.audioCtx=new AudioContext();
  const src=S.audioCtx.createMediaElementSource(audio);
  S.analyser=S.audioCtx.createAnalyser();
  S.analyser.fftSize=256;
  src.connect(S.analyser);
  S.analyser.connect(S.audioCtx.destination);
  S.speaking=true;
  document.getElementById("faceCard").classList.add("speaking");
  document.getElementById("discussBtn").textContent="Speaking…";
  setStatus("Speaking…","blue");
  audio.onended=()=>{resetState();};
  audio.play().catch(()=>resetState());
}
function resetState(){
  S.speaking=false;
  document.getElementById("faceCard").classList.remove("speaking");
  document.getElementById("discussBtn").textContent="Discuss";
  document.getElementById("discussBtn").disabled=false;
  setStatus("Ready · Tap Discuss","green");
  setTimeout(()=>{document.getElementById("responseBubble").style.display="none";},3000);
}
function startDiscuss(){if(!S.ready){connectServer();return;}}
function sendText(text){
  if(!S.ws||!S.ready)return;
  S.speaking=true;
  document.getElementById("discussBtn").disabled=true;
  document.getElementById("discussBtn").textContent="Thinking…";
  setStatus("Thinking…","blue");
  S.ws.send(JSON.stringify({type:"speak",text}));
}
window.onload=()=>setTimeout(connectServer,500);
</script>
</body>
</html>

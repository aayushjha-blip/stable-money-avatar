<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stable Money · Aayush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.status-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 16px;font-size:13px;display:flex;align-items:center;gap:8px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#666;}
.status-dot.green{background:#4ade80;}
.status-dot.gold{background:#fbbf24;}
.status-dot.blue{background:#60a5fa;}
.status-dot.red{background:#f87171;}
.settings-btn{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;color:#fff;}
.settings-panel{position:fixed;top:56px;right:16px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:16px;width:300px;display:none;z-index:100;}
.settings-panel.open{display:block;}
.settings-panel input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px;color:#fff;font-size:13px;margin:8px 0;}
.settings-panel button{width:100%;background:#4a90d9;border:none;border-radius:8px;padding:8px;color:#fff;cursor:pointer;font-size:14px;}
.face-card{width:320px;height:420px;background:linear-gradient(160deg,#1a1a2e,#0f0f1a);border:1px solid rgba(255,255,255,0.08);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:16px;}
.face-card.speaking{box-shadow:0 0 0 2px rgba(74,144,217,0.6),0 0 40px rgba(74,144,217,0.15);}
#avatarSvg{width:220px;height:260px;}
.name-block{text-align:center;margin-top:8px;}
.name-block h2{font-size:22px;font-weight:600;}
.name-block p{font-size:14px;color:rgba(255,255,255,0.5);margin-top:2px;}
.response-bubble{position:absolute;top:12px;left:12px;right:12px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.5;display:none;max-height:100px;overflow:hidden;}
.discuss-btn{background:linear-gradient(135deg,#4a90d9,#357abd);border:none;border-radius:24px;padding:14px 48px;font-size:17px;font-weight:600;color:#fff;cursor:pointer;margin-bottom:20px;}
.discuss-btn:disabled{opacity:0.5;cursor:default;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 16px;max-width:500px;}
.chip{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;transition:background 0.2s;}
.chip:hover{background:rgba(255,255,255,0.12);}
</style>
</head>
<body>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Connecting…</span>
</div>

<button class="settings-btn" onclick="toggleSettings()">⚙ Settings</button>
<div class="settings-panel" id="settingsPanel">
  <div style="font-size:13px;margin-bottom:8px;color:rgba(255,255,255,0.6);">WebSocket URL</div>
  <input type="text" id="serverUrl" value="ws://localhost:8000/ws/talk" placeholder="wss://...ngrok.../ws/talk"/>
  <button onclick="connectServer()">Connect</button>
</div>

<div class="face-card" id="faceCard">
  <div class="response-bubble" id="responseBubble"></div>

  <!-- SVG Animated Avatar -->
  <svg id="avatarSvg" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg">
    <!-- Shoulders / shirt -->
    <path d="M10 260 Q30 215 85 208 Q110 205 135 208 Q190 215 210 260Z" fill="#2563eb"/>
    <!-- Collar -->
    <path d="M88 208 L100 228 L110 220 L120 228 L132 208" fill="white"/>
    <!-- Neck -->
    <rect x="93" y="193" width="34" height="20" rx="6" fill="#e8b48a"/>
    <!-- Head -->
    <ellipse cx="110" cy="128" rx="62" ry="72" fill="#e8b48a"/>
    <!-- Hair top -->
    <ellipse cx="110" cy="68" rx="62" ry="30" fill="#1e0f08"/>
    <!-- Hair sides -->
    <rect x="48" y="68" width="16" height="50" rx="8" fill="#1e0f08"/>
    <rect x="156" y="68" width="16" height="50" rx="8" fill="#1e0f08"/>
    <!-- Ears -->
    <ellipse cx="48" cy="132" rx="9" ry="12" fill="#e8b48a"/>
    <ellipse cx="172" cy="132" rx="9" ry="12" fill="#1e0f08" opacity="0.15"/>
    <ellipse cx="172" cy="132" rx="9" ry="12" fill="#e8b48a"/>
    <!-- Eyebrows -->
    <path d="M76 106 Q88 101 100 106" stroke="#1e0f08" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M120 106 Q132 101 144 106" stroke="#1e0f08" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Eyes white -->
    <ellipse cx="88" cy="120" rx="11" ry="9" fill="white"/>
    <ellipse cx="132" cy="120" rx="11" ry="9" fill="white"/>
    <!-- Iris -->
    <ellipse cx="88" cy="120" rx="6" ry="6" fill="#3d2b1f"/>
    <ellipse cx="132" cy="120" rx="6" ry="6" fill="#3d2b1f"/>
    <!-- Pupil -->
    <ellipse cx="88" cy="120" rx="3" ry="3" fill="#0a0604"/>
    <ellipse cx="132" cy="120" rx="3" ry="3" fill="#0a0604"/>
    <!-- Eye shine -->
    <ellipse cx="90" cy="118" rx="1.5" ry="1.5" fill="white"/>
    <ellipse cx="134" cy="118" rx="1.5" ry="1.5" fill="white"/>
    <!-- Eyelids for blinking -->
    <ellipse id="leftLid" cx="88" cy="120" rx="11" ry="0" fill="#e8b48a"/>
    <ellipse id="rightLid" cx="132" cy="120" rx="11" ry="0" fill="#e8b48a"/>
    <!-- Nose -->
    <path d="M107 138 Q110 148 113 138" stroke="#c4845a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Mouth -->
    <path d="M92 164 Q101 160 110 162 Q119 160 128 164" stroke="#b06040" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse id="mouthOpen" cx="110" cy="166" rx="16" ry="0" fill="#7a1f1f"/>
    <path id="lowerLip" d="M92 166 Q110 172 128 166" stroke="#b06040" stroke-width="1.5" fill="#d4845a" stroke-linecap="round"/>
  </svg>

  <div class="name-block">
    <h2>StableAI</h2>
    <p>Stable Money · Fixed Income Advisor</p>
  </div>
</div>

<button class="discuss-btn" id="discussBtn" onclick="startDiscuss()">Discuss</button>

<div class="chips">
  <div class="chip" onclick="sendText('What is Stable Money?')">What is Stable Money?</div>
  <div class="chip" onclick="sendText('How safe are FDs?')">How safe are FDs?</div>
  <div class="chip" onclick="sendText('Expected returns?')">Expected returns?</div>
  <div class="chip" onclick="sendText('Tell me about Sukoon')">Tell me about Sukoon</div>
  <div class="chip" onclick="sendText('Better than bank FDs?')">Better than bank FDs?</div>
  <div class="chip" onclick="sendText('Min investment?')">Min investment?</div>
</div>

<script>
const S={ws:null,ready:false,speaking:false,audioCtx:null,analyser:null,animId:null,blinkId:null};

function toggleSettings(){document.getElementById("settingsPanel").classList.toggle("open");}

function setStatus(txt,color){
  document.getElementById("statusText").textContent=txt;
  const d=document.getElementById("statusDot");
  d.className="status-dot"+(color?" "+color:"");
}

function connectServer(){
  const url=document.getElementById("serverUrl").value.trim();
  document.getElementById("settingsPanel").classList.remove("open");
  setStatus("Connecting…","gold");
  try{
    S.ws=new WebSocket(url);
    S.ws.onopen=()=>{
      S.ws.send(JSON.stringify({type:"config"}));
      S.ready=true;
      setStatus("Ready · Tap Discuss","green");
      startBlinking();
    };
    S.ws.onmessage=e=>handleMsg(JSON.parse(e.data));
    S.ws.onerror=()=>{setStatus("Connection failed","red");S.ready=false;};
    S.ws.onclose=()=>{setStatus("Disconnected","red");S.ready=false;};
  }catch(err){setStatus("Error: "+err.message,"red");}
}

function handleMsg(msg){
  if(msg.type==="text_chunk"){
    const b=document.getElementById("responseBubble");
    b.textContent=msg.text;
    b.style.display="block";
  }
  if(msg.type==="audio"){playAudio(msg.data,msg.format);}
  if(msg.type==="done"){if(!S.speaking)resetState();}
  if(msg.type==="error"){setStatus("Error","red");resetState();}
}

function playAudio(b64,fmt){
  const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const blob=new Blob([bytes],{type:"audio/"+fmt});
  const url=URL.createObjectURL(blob);
  const audio=new Audio(url);
  if(!S.audioCtx)S.audioCtx=new AudioContext();
  const src=S.audioCtx.createMediaElementSource(audio);
  S.analyser=S.audioCtx.createAnalyser();
  S.analyser.fftSize=256;
  src.connect(S.analyser);
  S.analyser.connect(S.audioCtx.destination);
  S.speaking=true;
  document.getElementById("faceCard").classList.add("speaking");
  document.getElementById("discussBtn").textContent="Speaking…";
  setStatus("Speaking…","blue");
  driveMouth();
  audio.onended=()=>{
    cancelAnimationFrame(S.animId);
    setMouth(0);
    resetState();
  };
  audio.play().catch(()=>resetState());
}

function driveMouth(){
  if(!S.analyser)return;
  const data=new Uint8Array(S.analyser.frequencyBinCount);
  S.analyser.getByteFrequencyData(data);
  const vol=data.slice(0,12).reduce((a,b)=>a+b,0)/12/255;
  setMouth(vol);
  S.animId=requestAnimationFrame(driveMouth);
}

function setMouth(vol){
  const opening=Math.min(vol*2.5,1);
  const ry=opening*14;
  document.getElementById("mouthOpen").setAttribute("ry",ry);
  document.getElementById("lowerLip").setAttribute("d",
    `M88 170 Q110 ${170+ry*0.8} 132 170`
  );
}

function startBlinking(){
  function blink(){
    const dur=150;
    let t=0;
    const iv=setInterval(()=>{
      t+=16;
      const progress=t<dur/2?t/(dur/2):2-t/(dur/2);
      const ry=progress*13;
      document.getElementById("leftLid").setAttribute("ry",ry);
      document.getElementById("rightLid").setAttribute("ry",ry);
      if(t>=dur){clearInterval(iv);}
    },16);
    // Next blink in 2-5 seconds
    S.blinkId=setTimeout(blink,2000+Math.random()*3000);
  }
  blink();
}

function resetState(){
  S.speaking=false;
  document.getElementById("faceCard").classList.remove("speaking");
  document.getElementById("discussBtn").textContent="Discuss";
  document.getElementById("discussBtn").disabled=false;
  setStatus("Ready · Tap Discuss","green");
  setTimeout(()=>{document.getElementById("responseBubble").style.display="none";},3000);
}

function startDiscuss(){
  if(!S.ready){connectServer();return;}
  sendText("What is Stable Money?");
}

function sendText(text){
  if(!S.ws||!S.ready)return;
  S.speaking=true;
  document.getElementById("discussBtn").disabled=true;
  document.getElementById("discussBtn").textContent="Thinking…";
  setStatus("Thinking…","blue");
  S.ws.send(JSON.stringify({type:"speak",text}));
}

window.onload=()=>setTimeout(connectServer,500);
</script>
</body>
</html>
